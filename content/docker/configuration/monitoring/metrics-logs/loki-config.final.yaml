auth_enabled: false

server:
  http_listen_port: 3100
  grpc_listen_port: 9096

ingester:
  wal:
    enabled: true
    dir: /loki/wal
  lifecycler:
    address: 127.0.0.1
    ring:
      kvstore:
        store: inmemory
      replication_factor: 1
    final_sleep: 0s
  chunk_idle_period: 1h # Any chunk not receiving new logs in this time will be flushed
  max_chunk_age: 1h # All chunks will be flushed when they hit this age, default is 1h
  chunk_target_size: 1048576 # Loki will attempt to build chunks up to 1.5MB, flushing first if chunk_idle_period or max_chunk_age is reached first
  chunk_retain_period: 20m # Must be greater than index read cache TTL if using an index cache (Default index read cache TTL is 5m)
  max_transfer_retries: 0 # Chunk transfers disabled

schema_config:
  configs:
    - from: 2020-10-24
      store: boltdb-shipper
      object_store: filesystem
      schema: v11
      index:
        prefix: index_
        period: 24h
      chunks:
        prefix: chunk_
        period: 24h

storage_config:
  boltdb_shipper:
    active_index_directory: /loki/boltdb-shipper-active
    cache_location: /loki/boltdb-shipper-cache
    cache_ttl: 720h # Can be increased for faster performance over longer query periods, uses more disk space
    shared_store: filesystem
  filesystem:
    directory: /loki/chunks

compactor:
  working_directory: /loki/boltdb-shipper-compactor
  shared_store: filesystem
  retention_enabled: true

limits_config:
  reject_old_samples: true
  reject_old_samples_max_age: 168h
  max_query_parallelism: 3500
  max_streams_per_user: 500000
  ingestion_rate_mb: 16
  ingestion_burst_size_mb: 24
  max_concurrent_tail_requests: 20
  retention_period: 31d
  per_stream_rate_limit: 16MB
  per_stream_rate_limit_burst: 64MB
  split_queries_by_interval: 1h

chunk_store_config:
  max_look_back_period: 720h
  cache_lookups_older_than: 24h
  chunk_cache_config:
    enable_fifocache: true
    fifocache:
      max_size_bytes: 2048000000

table_manager:
  index_tables_provisioning:
    enable_ondemand_throughput_mode: true
    enable_inactive_throughput_on_demand_mode: true
  retention_deletes_enabled: true
  retention_period: 720h

ruler:
  storage:
    type: local
    local:
      directory: /loki/rules
  rule_path: /loki/rules-temp
  alertmanager_url: http://localhost:9093
  ring:
    kvstore:
      store: inmemory
  enable_api: true

querier:
  max_concurrent: 50
  query_timeout: 5m
  extra_query_delay: 30s
  engine:
    timeout: 5m
    max_look_back_period: 2m
  query_ingesters_within: 3h

query_range:
  max_retries: 5
  cache_results: true
  parallelise_shardable_queries: true

  results_cache:
    cache:
      enable_fifocache: true
      fifocache:
        max_size_items: 2048000000
        validity: 48h

frontend:
  address: 127.0.0.1
  log_queries_longer_than: 5s
  compress_responses: true
