global:
  scrape_interval: 10s

scrape_configs:
  - job_name: "prometheus"
    static_configs:
      - targets: ["prometheus:9090"]

  - job_name: "node-1"
    static_configs:
      - targets: ["192.168.0.2:9100"]
  - job_name: "cadvisor-1"
    static_configs:
      - targets: ["192.168.0.2:8080"]

  - job_name: "node-2"
    static_configs:
      - targets: ["192.168.0.3:9100"]
  - job_name: "cadvisor-2"
    static_configs:
      - targets: ["192.168.0.3:8080"]
