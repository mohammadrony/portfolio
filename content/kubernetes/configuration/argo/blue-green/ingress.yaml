apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: active
spec:
  ingressClassName: nginx
  rules:
    - host: active.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: active
                port:
                  name: http
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: preview
spec:
  ingressClassName: nginx
  rules:
    - host: preview.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: preview
                port:
                  name: http
