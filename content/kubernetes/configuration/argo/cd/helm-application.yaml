apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: <app-name>
  namespace: argocd
spec:
  destination:
    namespace: <namespace>
    server: "https://kubernetes.default.svc"
  project: default
  source:
    path: <path>
    repoURL: "<repo-url>"
    targetRevision: <branch>
    helm:
      releaseName: <release-name>
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
