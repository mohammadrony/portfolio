apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: canary-app
  namespace: argocd
spec:
  destination:
    namespace: canary
    server: "https://kubernetes.default.svc"
  project: default
  source:
    path: configuration/argo/canary
    repoURL: "https://gitlab.com/mohammadrony/kubernetes.git"
    targetRevision: main
    directory:
      recurse: true
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
