apiVersion: v1
kind: ServiceAccount
metadata:
  name: default-admin-sa
  namespace: default
---
apiVersion: v1
kind: Secret
type: kubernetes.io/service-account-token
metadata:
  name: default-admin-secret
  namespace: default
  annotations:
    kubernetes.io/service-account.name: "default-admin-sa"
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: default-read-only-role
  namespace: default
rules:
  - apiGroups: ["*"]
    resources: ["*"]
    verbs: ["*"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: default-admin-role-binding
subjects:
  - kind: ServiceAccount
    name: default-admin-sa
    namespace: default
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: default-admin
