adminPassword: admin

sidecar:
  enableUniqueFilenames: true
  dashboards:
    enabled: true
    provider:
      foldersFromFilesStructure: true
  datasources:
    enabled: true
grafana.ini:
  server:
    root_url: "%(protocol)s://%(domain)s:%(http_port)s/"
    serve_from_sub_path: true

datasources:
  datasources.yaml:
    apiVersion: 1
    datasources:
      - name: Tempo
        type: tempo
        access: proxy
        orgId: 1
        uid: tempo
        url: http://tempo.monitoring.svc:3100
        isDefault: false
        editable: true
      - name: Loki
        type: loki
        access: proxy
        orgId: 1
        uid: loki
        url: http://loki-gateway.monitoring.svc
        isDefault: false
        editable: true
      - name: Prometheus
        type: prometheus
        access: proxy
        orgId: 1
        uid: prometheus
        url: http://kube-prometheus-stack-prometheus.monitoring.svc:9090
        isDefault: false
        editable: true
